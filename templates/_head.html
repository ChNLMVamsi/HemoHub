{% load static %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="{% static 'hemohub-logo.png' %}">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#0F172A',
          crimson: { DEFAULT: '#DC2626', 600: '#DC2626', 700: '#B91C1C' },
        },
        fontFamily: {
          display: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui'],
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
        },
      },
    },
  }
</script>
<style>
  body { font-feature-settings: "cv11"; }
  .tnum { font-variant-numeric: tabular-nums; }
  :focus-visible { outline: 2px solid #DC2626; outline-offset: 2px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>
